<!DOCTYPE html>
<html lang="en">
<head>
    <title>Suazo Trailer</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Comfortaa:wght@300;400&display=swap" rel="stylesheet">

    <style>
        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Comfortaa', sans-serif;
        }

        /* NAVBAR */
        .navbar {
            position: sticky;
            top: 0;
            z-index: 1000;
            background-color: DodgerBlue;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            color: white;
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
        }

            .logo img {
                height: 40px;
                width: 40px;
            }

        .nav-links {
            display: flex;
            gap: 20px;
        }

            .nav-links a {
                text-decoration: none;
                color: white;
                font-weight: bold;
                padding: 8px 15px;
                border-radius: 20px;
                transition: background 0.3s;
            }

                .nav-links a:hover {
                    background-color: #1c86ee;
                }

        .content {
            padding: 40px;
        }

        /* ABOUT SECTION */
        .footer-container {
            background-color: DodgerBlue;
            font-family: 'Playfair Display', serif;
            color: #800020;
            text-align: center;
            box-shadow: 0 -2px 8px rgba(0, 0, 0, 0.2);
            border-radius: 40px;
            padding: 30px;
            max-width: 800px;
            margin: 0 auto;
        }

        /* CONTACT FORM */
        .contact-section {
            text-align: center;
            margin-top: 80px;
        }

        form {
            max-width: 500px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        input, textarea {
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #ccc;
            font-family: 'Comfortaa', sans-serif;
        }

        button {
            padding: 12px;
            border: none;
            border-radius: 20px;
            background-color: DodgerBlue;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

            button:hover {
                background-color: #1c86ee;
            }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <div class="navbar">
        <!--<div class="logo">
             Replace with your own logo if you have one
            <img src="" alt="Logo">
            PlumbPro
        </div>-->

        <div class="nav-links">
            <a href="https://www.suazotrailer.com/Index">Plumbing</a>
            <a href="https://www.suazotrailer.com/Trailer">Suazo Trailer</a>
            <a href="https://www.suazotrailer.com/Contact">Contact Me</a>
        </div>
    </div>

    <div class="content">


        <!-- CONTACT -->
        <div class="contact-section" id="contact">
            <h2>Contact Me</h2>
            <p>Phone number: (213) 864 - 1738</p>
            <p>Email: plumbprosuazo@gmail.com</p>
        </div>

    </div>

</body>
</html>
